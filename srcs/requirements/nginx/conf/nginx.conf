server {
    #SSL configuration
    listen 443 ssl;
    listen [::]:443 ssl;

    #domain name
    server_name dda-fons.42.fr;

    #path to the certificates generated in the Dockerfile
    ssl_certificate /etc/nginx/ssl/inception.crt;
    ssl_certificate_key /etc/nginx/ssl/inception.key;

    #protocols required
    ssl_protocols TLSv1.2 TLSv1.3;

    #root directory for wordpress files and the index order
    root /var/www/html;
    index index.php index.html;

    location / {
        #check if the file exists, otherwise throw a 404 error
        try_files $uri $uri/ /index.php?$args;
    }

    #this section will pass php requests to the wordpress container
    location ~ \.php$ {
        include fastcgi_params;
        include snippets/fastcgi-php.conf;
        fastcgi_pass wordpress:9000;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}
